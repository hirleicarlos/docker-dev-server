version: "1.1.0"

services:
  web:
    build: .
    container_name: php_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/hirleicarlos/projetos:/var/www/html:rw
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: mariadb_server
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - /home/hirleicarlos/db:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_server
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      - db

  node:
    image: node:20
    container_name: node_server
    working_dir: /app
    volumes:
      - /home/hirleicarlos/projetos:/app
    ports:
      - "3000:3000"
      - "8082:8082"
    tty: true
    stdin_open: true